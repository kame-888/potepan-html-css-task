<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>サイト模写</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <!-- ここに本体を書いていきましょう -->
    <header>
      <div class="header-flex">
        <div class="header-logo">
          <img src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/header-logo.png" href="https://camp.potepan.com/courses/rails-career/">
        </div>
        <div class="header-nav">
          <input type="checkbox" id="menu-toggle" hidden>
          <label for="menu-toggle" class="menu-icon">
            <span></span><span></span><span></span>
          </label>
          <nav>
            <ul>
              <li>
                <a href="https://camp.potepan.com/courses/rails-career/#learning-content"><span>CONTENT</span><span>学習内容</span></a>
              </li>
              <li>
                <a href="https://camp.potepan.com/interview"><span></span>INTERVIEW<span>受講生の声</span></a>
              </li>
              <li>
                <a href="https://camp.potepan.com/courses/rails-career/#faq"><span></span>FAQ<span>よくある質問</span></a>
              </li>
              <li>
                <a href="https://camp.potepan.com/recruit"><span></span>RECRUIT<span>採用企業様へ</span></a>
              </li>
              <li>
                <a href="https://camp.potepan.com/"><span></span>U29<span>29歳以下の方へ</span></a>
              </li>
            </ul>
          </nav>
          <button class="header-button" onclick="location.href='https://camp.potepan.com/contact'">無料カウンセリング</button>
        </div>
      </div>
    </header>
    <div class="main-visual">
      <img class="background-image-1" src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/left-rectangle.svg" alt="左上の三角のデザイン">
      <img class="background-image-2" src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/right-rectangle.svg" alt="右下の三角のデザイン">
      <img class="background-image-3" src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/fill-rectangle.svg" alt="円筒デザイン">
      <img class="background-image-4" src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/main-visual.webp" alt="人物のイラスト" width="775px" height="auto">
      <div class="main-text">
        <h1>実践的カリキュラムと<br>豊富な提携求人で<br>確実にITエンジニアへ</h1>
        <button class="main-button" onclick="location.href='https://camp.potepan.com/contact'">まずは無料カウンセリングへ</button>
        <p>※ショッパーズアイ「プログラミングスクール10社を対象にしたサイト比較イメージ調査<br>（2020 年 5 月 22 日～25 日）」より全国の22～49歳の男女691名へのインターネット調査</p>
        <img class="maintext-image" src="https://camp.potepan.com/wp-content/themes/potepancamp/assets/images/home/first-view/badge.svg">
      </div>
    </div>
  </body>
</html>
